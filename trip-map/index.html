<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trip Mapper — turn an itinerary into a map</title>
<link rel="stylesheet" href="lib/leaflet.css">
<style>
  :root{
    --bg:#f4f1ea; --panel:#fffdf8; --ink:#23201b; --dim:#8a8275; --line:#e3ddd0;
    --accent:#c0603a; --accent2:#2f6f6a; --shadow:0 2px 10px rgba(40,30,20,.12);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:var(--bg);}
  #app{display:flex;height:100vh;overflow:hidden;}

  /* ── SIDEBAR ── */
  #side{width:420px;min-width:340px;max-width:46vw;display:flex;flex-direction:column;
    background:var(--panel);border-right:1px solid var(--line);box-shadow:var(--shadow);z-index:500;}
  #side header{padding:14px 18px 10px;border-bottom:1px solid var(--line);}
  #side h1{margin:0;font-size:1.15rem;letter-spacing:.3px;display:flex;align-items:center;gap:8px;}
  #side h1 .pin{font-size:1.2rem;}
  .sub{font-size:.72rem;color:var(--dim);margin-top:2px;}
  .trip-title{width:100%;border:none;background:transparent;font-size:1rem;font-weight:600;
    color:var(--ink);margin-top:8px;padding:4px 0;border-bottom:1px dashed var(--line);}
  .trip-title:focus{outline:none;border-bottom-color:var(--accent);}

  .tabs{display:flex;gap:4px;padding:8px 14px 0;}
  .tab{flex:1;padding:7px;font-size:.78rem;text-align:center;cursor:pointer;border:1px solid var(--line);
    border-bottom:none;border-radius:7px 7px 0 0;background:#efe9dd;color:var(--dim);}
  .tab.on{background:var(--panel);color:var(--ink);font-weight:600;box-shadow:0 -2px 6px rgba(0,0,0,.04);}

  .pane{flex:1;overflow-y:auto;padding:12px 14px;}
  .pane.hidden{display:none;}

  /* paste pane */
  #paste-text{width:100%;height:calc(100% - 92px);min-height:240px;resize:none;border:1px solid var(--line);
    border-radius:8px;padding:10px;font-size:.82rem;line-height:1.5;font-family:ui-monospace,Menlo,Consolas,monospace;
    color:var(--ink);background:#fffefb;}
  #paste-text:focus{outline:none;border-color:var(--accent);}
  .paste-actions{display:flex;gap:8px;margin-top:10px;}

  /* stop list */
  .stop{border:1px solid var(--line);border-radius:9px;margin-bottom:9px;background:#fffefb;
    box-shadow:0 1px 3px rgba(0,0,0,.04);overflow:hidden;}
  .stop.dragging{opacity:.4;}
  .stop.dragover{border-color:var(--accent);box-shadow:0 0 0 2px rgba(192,96,58,.25);}
  .stop-head{display:flex;align-items:center;gap:9px;padding:9px 10px;cursor:grab;}
  .stop-num{flex:none;width:26px;height:26px;border-radius:50%;color:#fff;font-size:.78rem;font-weight:700;
    display:flex;align-items:center;justify-content:center;box-shadow:0 1px 2px rgba(0,0,0,.2);}
  .stop-main{flex:1;min-width:0;}
  .stop-place{width:100%;border:none;background:transparent;font-size:.92rem;font-weight:600;color:var(--ink);padding:1px 0;}
  .stop-place:focus{outline:none;}
  .stop-place.unresolved{color:var(--accent);}
  .stop-meta{display:flex;align-items:center;gap:7px;font-size:.68rem;color:var(--dim);margin-top:1px;}
  .stop-meta select{font-size:.68rem;border:1px solid var(--line);border-radius:5px;padding:1px 3px;background:#fff;color:var(--dim);}
  .geo-dot{width:7px;height:7px;border-radius:50%;flex:none;}
  .geo-ok{background:#4a9b5e;} .geo-bad{background:var(--accent);} .geo-pend{background:#d8b84a;}
  .stop-tools{display:flex;flex-direction:column;gap:2px;}
  .icon-btn{border:none;background:transparent;cursor:pointer;color:var(--dim);font-size:.85rem;padding:2px 5px;border-radius:4px;line-height:1;}
  .icon-btn:hover{background:#eee5d6;color:var(--ink);}
  .stop-notes{padding:0 10px 9px 45px;}
  .stop-notes textarea{width:100%;border:1px solid var(--line);border-radius:6px;padding:6px 8px;
    font-size:.76rem;line-height:1.4;resize:vertical;min-height:30px;color:#544e44;background:#fff;font-family:inherit;}
  .stop-notes textarea:focus{outline:none;border-color:var(--accent2);}

  .btn{border:1px solid var(--line);background:#fff;color:var(--ink);padding:8px 13px;border-radius:8px;
    font-size:.8rem;cursor:pointer;font-weight:600;transition:.12s;}
  .btn:hover{border-color:var(--accent);color:var(--accent);}
  .btn.primary{background:var(--accent);color:#fff;border-color:var(--accent);}
  .btn.primary:hover{background:#a94e2d;color:#fff;}
  .btn.full{width:100%;}
  .btn.sm{padding:5px 9px;font-size:.74rem;}
  .toolbar{display:flex;gap:7px;padding:10px 14px;border-top:1px solid var(--line);flex-wrap:wrap;background:var(--panel);}

  /* ── MAP ── */
  #map{flex:1;height:100%;background:#dfe6e3;}
  .num-marker{display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;
    border-radius:50% 50% 50% 0;transform:rotate(-45deg);box-shadow:0 2px 5px rgba(0,0,0,.35);
    border:2px solid #fff;}
  .num-marker span{transform:rotate(45deg);font-size:.8rem;}
  .leaflet-popup-content{font-size:.85rem;line-height:1.5;margin:10px 12px;}
  .pop-day{font-size:.68rem;text-transform:uppercase;letter-spacing:.6px;font-weight:700;}
  .pop-place{font-size:1rem;font-weight:700;margin:2px 0;}
  .pop-notes{color:#555;font-size:.8rem;}

  /* legend */
  #legend{position:absolute;right:12px;bottom:22px;z-index:600;background:var(--panel);border:1px solid var(--line);
    border-radius:10px;padding:9px 11px;box-shadow:var(--shadow);font-size:.74rem;max-height:40vh;overflow-y:auto;max-width:170px;}
  #legend h4{margin:0 0 5px;font-size:.7rem;text-transform:uppercase;letter-spacing:.5px;color:var(--dim);}
  .leg-row{display:flex;align-items:center;gap:7px;padding:2px 0;cursor:default;}
  .leg-sw{width:12px;height:12px;border-radius:3px;flex:none;}

  #toast{position:absolute;left:50%;bottom:24px;transform:translateX(-50%);background:#23201b;color:#fff;
    padding:9px 16px;border-radius:20px;font-size:.8rem;z-index:900;opacity:0;transition:.3s;pointer-events:none;box-shadow:var(--shadow);}
  #toast.show{opacity:1;}

  /* mobile */
  #handle{display:none;}
  @media(max-width:760px){
    #app{flex-direction:column;}
    #side{width:100%;max-width:100%;height:54%;border-right:none;border-bottom:1px solid var(--line);}
    #map{height:46%;}
    #legend{bottom:auto;top:8px;right:8px;max-height:30vh;}
  }
  @media print{
    #side{display:none;} #legend{display:none;} #toast{display:none;}
    #app{display:block;} #map{height:100vh;width:100vw;}
  }
</style>
</head>
<body>
<div id="app">
  <aside id="side">
    <header>
      <h1><span class="pin">🗺️</span> Trip Mapper</h1>
      <div class="sub">Paste an itinerary → get a map. Edit anything; it updates live.</div>
      <input class="trip-title" id="trip-title" value="My Trip" aria-label="Trip title">
    </header>

    <div class="tabs">
      <div class="tab on" id="tab-itin" onclick="showTab('itin')">📋 Itinerary</div>
      <div class="tab" id="tab-paste" onclick="showTab('paste')">📝 Paste text</div>
    </div>

    <div class="pane" id="pane-itin"><!-- stop list renders here --></div>

    <div class="pane hidden" id="pane-paste">
      <div class="sub" style="margin-bottom:8px;">
        One stop per line. Start a line with <b>Day 1</b>, <b>Day 2</b>… to group by day
        (or write dates like <b>Jun 3</b>). Everything after the place name becomes notes.
      </div>
      <textarea id="paste-text" spellcheck="false"></textarea>
      <div class="paste-actions">
        <button class="btn primary" onclick="parseAndLoad()">▶ Build map from text</button>
        <button class="btn" onclick="loadSample()">Load sample</button>
      </div>
    </div>

    <div class="toolbar">
      <button class="btn sm" onclick="addStop()">＋ Add stop</button>
      <button class="btn sm" onclick="fitAll()">⤢ Fit map</button>
      <button class="btn sm" onclick="shareTrip()">🔗 Share</button>
      <button class="btn sm" onclick="window.print()">🖨 Print</button>
      <button class="btn sm" onclick="resetSample()">↺ Reset</button>
    </div>
  </aside>

  <div id="map"></div>
  <div id="legend"><h4>Days</h4><div id="legend-body"></div></div>
</div>
<div id="toast"></div>

<script src="lib/leaflet.js"></script>
<script>
// ============================================================
// Trip Mapper — single-file, no backend.
// Geocoding: built-in gazetteer first (instant, offline), then
// Nominatim (OSM) for anything unknown, throttled + cached.
// ============================================================

// ---------- built-in gazetteer (lon/lat of common places) ----------

const DAY_COLORS=["#c0603a","#2f6f6a","#6a4f9e","#3a7bc0","#b08a2e","#9e3a6a","#4a9b5e","#c0883a","#5a6a8a","#8a5a3a"];
const dayColor=(d)=>DAY_COLORS[((d||1)-1)%DAY_COLORS.length];

let trip={title:"My Trip",stops:[]};
let map, markerLayer, lineLayer, dragId=null;
let geoCache={};
try{ geoCache=JSON.parse(localStorage.getItem("tm_geocache")||"{}"); }catch(e){}

// ---------- SAMPLE ----------
const SAMPLE_TEXT=`Japan: Two Weeks in Spring

Day 1: Tokyo — land at Haneda, check in to Shinjuku, evening in Golden Gai
Day 2: Tokyo — Tsukiji breakfast, teamLab Planets, Shibuya crossing at night
Day 3: Tokyo — day trip to Nikko shrines and waterfalls
Day 4: Hakone — ryokan with onsen, views of Mount Fuji, the pirate ship on Lake Ashi
Day 5: Kyoto — bullet train in, Fushimi Inari at dusk
Day 6: Kyoto — Arashiyama bamboo grove, Kinkaku-ji, Gion in the evening
Day 7: Nara — day trip to feed the deer and see the Great Buddha
Day 8: Osaka — Dotonbori street food crawl, Osaka Castle
Day 9: Hiroshima — Peace Memorial Park and Museum
Day 10: Miyajima — the floating torii gate, hike Mount Misen`;

function loadSample(){ document.getElementById("paste-text").value=SAMPLE_TEXT; showTab("paste"); }
function resetSample(){
  if(trip.stops.length && !confirm("Replace the current trip with the sample itinerary?")) return;
  document.getElementById("paste-text").value=SAMPLE_TEXT;
  parseAndLoad();
}

// ---------- PARSER ----------
// Line-based: "Day N" / date prefix sets the current day; the rest of
// the line is "Place — notes" (also accepts : , - or "(" as separators).
function parseItinerary(text){
  const lines=text.split(/\r?\n/);
  const stops=[];
  let day=1, sawDay=false, title=null;
  const monthRe=/^((mon|tues|wednes|thurs|fri|satur|sun)day|jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)/i;

  for(let raw of lines){
    let line=raw.trim();
    if(!line) continue;
    // first non-empty line is the trip title unless it's already a stop
    // (i.e. unless it starts with "Day N" or a date)
    if(title===null && stops.length===0){
      const isDay=/^day\s*\d/i.test(line);
      const isDate=monthRe.test(line)||/^\d{1,2}[\/.]\d{1,2}/.test(line);
      if(!isDay && !isDate){ title=line.replace(/\s*[:–—\-]\s*$/,""); continue; }
    }
    let dayThisLine=null;
    // "Day 3" / "Day 3:" prefix
    let m=line.match(/^day\s*(\d+)\s*[:.\-–—)]?\s*/i);
    if(m){ dayThisLine=parseInt(m[1],10); line=line.slice(m[0].length).trim(); sawDay=true; }
    else {
      // date-ish prefix → advance to a new day automatically
      let d=line.match(/^(\w{3,9}\.?\s*\d{1,2}(st|nd|rd|th)?|\d{1,2}[\/.]\d{1,2})\s*[:.\-–—)]?\s*/i);
      if(d && (monthRe.test(line)|| /^\d{1,2}[\/.]/.test(line))){
        line=line.slice(d[0].length).trim();
        dayThisLine=(sawDay||stops.length)?day+1:1; sawDay=true;
      }
    }
    if(dayThisLine!=null) day=dayThisLine;
    if(!line) continue;
    // strip bullets/numbering
    line=line.replace(/^[•\-\*•\d.)\s]+/,"").trim();
    if(!line) continue;
    // split place from notes on the first strong separator
    let place=line, notes="";
    let sep=line.match(/\s[—–\-:|(]\s?|,\s/);
    if(sep){
      const idx=line.indexOf(sep[0]);
      place=line.slice(0,idx).trim();
      notes=line.slice(idx+sep[0].length).replace(/\)$/,"").trim();
    }
    // if the "place" is suspiciously long, it's probably prose — try gazetteer hit inside it
    if(place.split(/\s+/).length>4){
      const hit=findGazInText(line);
      if(hit){ place=hit; notes=line; }
    }
    if(place) stops.push({id:uid(),day,place,notes,lat:null,lng:null,status:"pend"});
  }
  return {title:title||"My Trip", stops};
}

function findGazInText(text){
  const low=text.toLowerCase();
  let best=null;
  for(const name in GAZ){
    if(low.includes(name) && (!best||name.length>best.length)) best=name;
  }
  return best? best.replace(/\b\w/g,c=>c.toUpperCase()) : null;
}

let _uidn=0; const uid=()=>"s"+(++_uidn)+"_"+Date.now().toString(36);

// ---------- GEOCODING ----------
function gazLookup(place){
  let k=place.toLowerCase().trim().replace(/[.,]/g,"");
  if(GAZ[k]) return GAZ[k];
  // try trailing token e.g. "Shinjuku, Tokyo" → tokyo
  const parts=k.split(/,|\//).map(s=>s.trim()).filter(Boolean);
  for(let i=parts.length-1;i>=0;i--) if(GAZ[parts[i]]) return GAZ[parts[i]];
  // substring gazetteer hit
  for(const name in GAZ) if(k.includes(name)) return GAZ[name];
  return null;
}

let _geoQueue=Promise.resolve(), _lastFetch=0;
async function geocode(place){
  const g=gazLookup(place);
  if(g) return {lat:g[0],lng:g[1],src:"gaz"};
  const ck="q:"+place.toLowerCase().trim();
  if(geoCache[ck]) return geoCache[ck];
  // throttle Nominatim to ~1 req/sec, serialized
  const run=_geoQueue.then(async()=>{
    const wait=Math.max(0,1100-(Date.now()-_lastFetch));
    if(wait) await new Promise(r=>setTimeout(r,wait));
    _lastFetch=Date.now();
    try{
      const u="https://nominatim.openstreetmap.org/search?format=json&limit=1&q="+encodeURIComponent(place);
      const res=await fetch(u,{headers:{"Accept":"application/json"}});
      const j=await res.json();
      if(j&&j[0]){
        const out={lat:+j[0].lat,lng:+j[0].lon,src:"osm"};
        geoCache[ck]=out;
        try{ localStorage.setItem("tm_geocache",JSON.stringify(geoCache)); }catch(e){}
        return out;
      }
    }catch(e){}
    return null;
  });
  _geoQueue=run.catch(()=>{});
  return run;
}

async function resolveStop(stop){
  stop.status="pend"; renderList();
  const r=await geocode(stop.place);
  if(r){ stop.lat=r.lat; stop.lng=r.lng; stop.status="ok"; }
  else { stop.lat=null; stop.lng=null; stop.status="bad"; }
  renderAll();
}
async function resolveAll(){
  for(const s of trip.stops){ if(s.lat==null||s.status==="pend"){ await resolveStop(s); } }
  fitAll();
}

// ---------- RENDER ----------
function renderAll(){ renderList(); renderMap(); renderLegend(); persist(); }

function renderList(){
  const pane=document.getElementById("pane-itin");
  if(!trip.stops.length){
    pane.innerHTML=`<div class="sub" style="text-align:center;padding:30px 10px;">
      No stops yet.<br>Paste an itinerary in the <b>Paste text</b> tab, or load the sample.</div>`;
    return;
  }
  pane.innerHTML="";
  trip.stops.forEach((s,i)=>{
    const el=document.createElement("div");
    el.className="stop"; el.draggable=true; el.dataset.id=s.id;
    const dotCls=s.status==="ok"?"geo-ok":s.status==="bad"?"geo-bad":"geo-pend";
    const dotTitle=s.status==="ok"?"Located":s.status==="bad"?"Couldn't find this place — try a city name":"Locating…";
    el.innerHTML=`
      <div class="stop-head">
        <div class="stop-num" style="background:${dayColor(s.day)}">${i+1}</div>
        <div class="stop-main">
          <input class="stop-place ${s.status==="bad"?"unresolved":""}" value="${esc(s.place)}"
            data-id="${s.id}" placeholder="Place name">
          <div class="stop-meta">
            <span class="geo-dot ${dotCls}" title="${dotTitle}"></span>
            Day <select data-id="${s.id}" class="day-sel">${dayOptions(s.day)}</select>
            <span class="muted">${s.status==="bad"?"not found":""}</span>
          </div>
        </div>
        <div class="stop-tools">
          <button class="icon-btn" title="Move up" onclick="moveStop('${s.id}',-1)">▲</button>
          <button class="icon-btn" title="Move down" onclick="moveStop('${s.id}',1)">▼</button>
          <button class="icon-btn" title="Remove" onclick="removeStop('${s.id}')">✕</button>
        </div>
      </div>
      <div class="stop-notes">
        <textarea data-id="${s.id}" class="note-area" placeholder="Notes (optional)">${esc(s.notes)}</textarea>
      </div>`;
    pane.appendChild(el);
  });
  wireListEvents();
}

function dayOptions(cur){
  const maxDay=Math.max(cur, ...trip.stops.map(s=>s.day), 1)+1;
  let o="";
  for(let d=1;d<=maxDay;d++) o+=`<option value="${d}" ${d===cur?"selected":""}>${d}</option>`;
  return o;
}

function wireListEvents(){
  document.querySelectorAll(".stop-place").forEach(inp=>{
    inp.addEventListener("change",e=>{
      const s=byId(e.target.dataset.id); if(!s) return;
      s.place=e.target.value.trim(); resolveStop(s);
    });
  });
  document.querySelectorAll(".note-area").forEach(t=>{
    t.addEventListener("change",e=>{ const s=byId(e.target.dataset.id); if(s){ s.notes=e.target.value; persist(); renderMap(); } });
  });
  document.querySelectorAll(".day-sel").forEach(sel=>{
    sel.addEventListener("change",e=>{ const s=byId(e.target.dataset.id); if(s){ s.day=+e.target.value; renderAll(); } });
  });
  // drag reorder
  document.querySelectorAll(".stop").forEach(el=>{
    el.addEventListener("dragstart",()=>{ dragId=el.dataset.id; el.classList.add("dragging"); });
    el.addEventListener("dragend",()=>{ el.classList.remove("dragging"); document.querySelectorAll(".stop").forEach(s=>s.classList.remove("dragover")); });
    el.addEventListener("dragover",e=>{ e.preventDefault(); el.classList.add("dragover"); });
    el.addEventListener("dragleave",()=>el.classList.remove("dragover"));
    el.addEventListener("drop",e=>{
      e.preventDefault();
      const from=trip.stops.findIndex(s=>s.id===dragId);
      const to=trip.stops.findIndex(s=>s.id===el.dataset.id);
      if(from<0||to<0||from===to) return;
      const [m]=trip.stops.splice(from,1);
      trip.stops.splice(to,0,m);
      renderAll();
    });
  });
}

function renderMap(){
  if(!map) return; // map library unavailable (offline first load) — list still works
  markerLayer.clearLayers(); lineLayer.clearLayers();
  const pts=trip.stops.filter(s=>s.lat!=null);
  // route line connecting located stops in order
  if(pts.length>1){
    L.polyline(pts.map(s=>[s.lat,s.lng]),{color:"#23201b",weight:2,opacity:.45,dashArray:"6 6"}).addTo(lineLayer);
  }
  trip.stops.forEach((s,i)=>{
    if(s.lat==null) return;
    const c=dayColor(s.day), sz=30;
    const icon=L.divIcon({className:"",html:
      `<div class="num-marker" style="width:${sz}px;height:${sz}px;background:${c}"><span>${i+1}</span></div>`,
      iconSize:[sz,sz],iconAnchor:[sz/2,sz]});
    const mk=L.marker([s.lat,s.lng],{icon}).addTo(markerLayer);
    mk.bindPopup(`<div class="pop-day" style="color:${c}">Day ${s.day} · Stop ${i+1}</div>
      <div class="pop-place">${esc(s.place)}</div>
      ${s.notes?`<div class="pop-notes">${esc(s.notes)}</div>`:""}`);
    mk.on("click",()=>focusStop(s.id));
  });
}

function renderLegend(){
  const days=[...new Set(trip.stops.map(s=>s.day))].sort((a,b)=>a-b);
  document.getElementById("legend-body").innerHTML=days.map(d=>{
    const places=trip.stops.filter(s=>s.day===d).map(s=>s.place).join(", ");
    return `<div class="leg-row"><span class="leg-sw" style="background:${dayColor(d)}"></span>
      <span><b>Day ${d}</b> ${esc(places).slice(0,40)}</span></div>`;
  }).join("")||"<div class='sub'>—</div>";
}

function focusStop(id){
  const s=byId(id); if(!s||s.lat==null) return;
  map.flyTo([s.lat,s.lng],Math.max(map.getZoom(),9),{duration:.6});
  markerLayer.eachLayer(l=>{ if(Math.abs(l.getLatLng().lat-s.lat)<1e-6) l.openPopup(); });
}

function fitAll(){
  if(!map) return;
  const pts=trip.stops.filter(s=>s.lat!=null).map(s=>[s.lat,s.lng]);
  if(pts.length===1) map.setView(pts[0],10);
  else if(pts.length>1) map.fitBounds(pts,{padding:[60,60]});
}

// ---------- EDIT ACTIONS ----------
function addStop(){
  const lastDay=trip.stops.length?trip.stops[trip.stops.length-1].day:1;
  const s={id:uid(),day:lastDay,place:"",notes:"",lat:null,lng:null,status:"bad"};
  trip.stops.push(s); renderAll(); showTab("itin");
  setTimeout(()=>{ const inp=document.querySelector(`.stop-place[data-id="${s.id}"]`); if(inp) inp.focus(); },50);
}
function removeStop(id){ trip.stops=trip.stops.filter(s=>s.id!==id); renderAll(); }
function moveStop(id,dir){
  const i=trip.stops.findIndex(s=>s.id===id), j=i+dir;
  if(i<0||j<0||j>=trip.stops.length) return;
  [trip.stops[i],trip.stops[j]]=[trip.stops[j],trip.stops[i]];
  renderAll();
}

function parseAndLoad(){
  const txt=document.getElementById("paste-text").value;
  if(!txt.trim()){ toast("Paste an itinerary first"); return; }
  const parsed=parseItinerary(txt);
  if(!parsed.stops.length){ toast("Couldn't find any stops in that text"); return; }
  trip=parsed;
  document.getElementById("trip-title").value=trip.title;
  showTab("itin"); renderAll(); resolveAll();
  toast(`Parsed ${trip.stops.length} stops`);
}

// ---------- PERSIST + SHARE ----------
function persist(){
  trip.title=document.getElementById("trip-title").value;
  try{ localStorage.setItem("tm_trip",JSON.stringify(trip)); }catch(e){}
}
function shareTrip(){
  persist();
  const payload={t:trip.title,s:trip.stops.map(s=>[s.place,s.day,s.notes,s.lat,s.lng])};
  const hash="#t="+encodeURIComponent(btoa(unescape(encodeURIComponent(JSON.stringify(payload)))));
  const url=location.origin+location.pathname+hash;
  navigator.clipboard?.writeText(url).then(()=>toast("Share link copied to clipboard")).catch(()=>prompt("Copy this link:",url));
}
function loadFromHash(){
  if(!location.hash.startsWith("#t=")) return false;
  try{
    const p=JSON.parse(decodeURIComponent(escape(atob(decodeURIComponent(location.hash.slice(3))))));
    trip={title:p.t||"My Trip",stops:p.s.map(a=>({id:uid(),place:a[0],day:a[1],notes:a[2],lat:a[3],lng:a[4],status:a[3]!=null?"ok":"bad"}))};
    return true;
  }catch(e){ return false; }
}

// ---------- HELPERS ----------
function byId(id){ return trip.stops.find(s=>s.id===id); }
function esc(s){ return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function showTab(t){
  document.getElementById("pane-itin").classList.toggle("hidden",t!=="itin");
  document.getElementById("pane-paste").classList.toggle("hidden",t!=="paste");
  document.getElementById("tab-itin").classList.toggle("on",t==="itin");
  document.getElementById("tab-paste").classList.toggle("on",t==="paste");
}
let _toastT=null;
function toast(msg){ const el=document.getElementById("toast"); el.textContent=msg; el.classList.add("show");
  clearTimeout(_toastT); _toastT=setTimeout(()=>el.classList.remove("show"),2200); }

// ---------- INIT ----------
function init(){
  if(typeof L!=="undefined"){
    map=L.map("map",{zoomControl:true,worldCopyJump:true}).setView([30,15],2);
    L.tileLayer("https://basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",{
      attribution:'&copy; OpenStreetMap &copy; CARTO', subdomains:"abcd", maxZoom:19
    }).addTo(map);
    markerLayer=L.layerGroup().addTo(map);
    lineLayer=L.layerGroup().addTo(map);
  } else {
    document.getElementById("map").innerHTML='<div style="padding:30px;text-align:center;color:#8a8275;font-size:.85rem;">Map needs an internet connection to load.<br>Your itinerary still works — edits are saved.</div>';
  }
  document.getElementById("trip-title").addEventListener("change",persist);

  let loaded=false;
  if(loadFromHash()){ loaded=true; }
  else { try{ const saved=JSON.parse(localStorage.getItem("tm_trip")||"null"); if(saved&&saved.stops&&saved.stops.length){ trip=saved; loaded=true; } }catch(e){} }

  if(loaded){
    document.getElementById("trip-title").value=trip.title;
    renderAll(); resolveAll();
  } else {
    // first visit → pre-populate the sample so there's always something on the map
    document.getElementById("paste-text").value=SAMPLE_TEXT;
    trip=parseItinerary(SAMPLE_TEXT);
    document.getElementById("trip-title").value=trip.title;
    renderAll(); resolveAll();
  }
}
init();
</script>
